<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">AIWF overview</title>
  <desc id="desc">AI Assistant produces work, AIWF records task, validation, review, evidence, and finalize, leading to verifiable completion.</desc>
  <rect width="760" height="520" fill="#f8fafc"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">
    <rect x="238" y="28" width="284" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="380" y="64" font-size="24" font-weight="700" fill="#0f172a">AI Assistant</text>

    <line x1="380" y1="92" x2="380" y2="130" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="238" y="142" width="284" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="380" y="178" font-size="24" font-weight="700" fill="#0f172a">Produces Work</text>

    <line x1="380" y1="206" x2="380" y2="244" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="202" y="256" width="356" height="162" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
    <rect x="202" y="256" width="356" height="48" rx="8" fill="#334155"/>
    <path d="M202 296 H558 V304 H202 Z" fill="#334155"/>
    <text x="380" y="288" font-size="26" font-weight="700" fill="#ffffff">AIWF</text>

    <g text-anchor="start" font-size="20" fill="#0f172a">
      <text x="250" y="334">Task</text>
      <text x="250" y="364">Validation</text>
      <text x="250" y="394">Review</text>
      <text x="430" y="334">Evidence</text>
      <text x="430" y="364">Finalize</text>
    </g>

    <g fill="#475569">
      <circle cx="230" cy="327" r="5"/>
      <circle cx="230" cy="357" r="5"/>
      <circle cx="230" cy="387" r="5"/>
      <circle cx="410" cy="327" r="5"/>
      <circle cx="410" cy="357" r="5"/>
    </g>

    <line x1="380" y1="424" x2="380" y2="462" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="204" y="474" width="352" height="34" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="380" y="498" font-size="22" font-weight="700" fill="#0f172a">Verifiable Completion</text>
  </g>
</svg>
