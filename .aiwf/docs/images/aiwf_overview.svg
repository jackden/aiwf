<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">AIWF workflow overview</title>
  <desc id="desc">Task, implementation, validation, review, correction, re-validation, completion gate, and evidence-backed closure.</desc>
  <rect width="900" height="600" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#b45309"/>
    </marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="42" width="160" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="150" y="78" font-size="24" font-weight="700" fill="#0f172a">Task</text>
    <line x1="230" y1="71" x2="290" y2="71" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="300" y="42" width="190" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="395" y="78" font-size="24" font-weight="700" fill="#0f172a">Implementation</text>
    <line x1="490" y1="71" x2="550" y2="71" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="560" y="42" width="160" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="640" y="78" font-size="24" font-weight="700" fill="#0f172a">Validation</text>
    <line x1="640" y1="100" x2="640" y2="160" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="560" y="170" width="160" height="58" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
    <text x="640" y="206" font-size="24" font-weight="700" fill="#0f172a">Review</text>
    <line x1="560" y1="199" x2="480" y2="199" stroke="#b45309" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="520" y="184" font-size="16" fill="#92400e">finding</text>

    <rect x="300" y="170" width="170" height="58" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
    <text x="385" y="206" font-size="24" font-weight="700" fill="#92400e">Correction</text>
    <line x1="385" y1="228" x2="385" y2="288" stroke="#b45309" stroke-width="3" marker-end="url(#arrow-red)"/>

    <rect x="300" y="298" width="170" height="58" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
    <text x="385" y="334" font-size="21" font-weight="700" fill="#92400e">Re-validation</text>
    <path d="M470 327 C510 327 510 199 560 199" fill="none" stroke="#b45309" stroke-width="3" marker-end="url(#arrow-red)"/>

    <line x1="640" y1="228" x2="640" y2="410" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="685" y="325" font-size="16" fill="#475569">no blocking finding</text>

    <rect x="535" y="420" width="210" height="58" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="640" y="456" font-size="22" font-weight="700" fill="#0f172a">Completion Gate</text>
    <line x1="640" y1="478" x2="640" y2="528" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="465" y="538" width="350" height="42" rx="8" fill="#334155" stroke="#1e293b" stroke-width="2"/>
    <text x="640" y="566" font-size="22" font-weight="700" fill="#ffffff">Evidence-backed Closure</text>
  </g>
</svg>
