name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  public-tree:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out public repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirement.txt

      - name: Install test dependencies
        run: python -m pip install -r requirement.txt

      - name: Compile runtime
        run: python -m py_compile .aiwf/bin/ai_workflow.py

      - name: Run unit tests
        run: python -m pytest -q

      - name: Build tracked-files-only fresh copy
        shell: python
        run: |
          from pathlib import Path
          import os
          import shutil
          import subprocess

          source = Path.cwd()
          target = Path(os.environ["RUNNER_TEMP"]) / "aiwf-fresh-copy"
          if target.exists():
              shutil.rmtree(target)
          target.mkdir(parents=True)

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for rel in files:
              src = source / rel
              dst = target / rel
              dst.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src, dst)

      - name: Validate fresh public tree boundary
        shell: python
        run: |
          from pathlib import Path
          import os
          import sys

          root = Path(os.environ["RUNNER_TEMP"]) / "aiwf-fresh-copy"
          denied = [
              "docs",
              "tools",
              "knowledge",
              ".aiwf/records",
              ".aiwf/events",
              ".aiwf/docs/knowledge",
              ".gitlab-ci.yml",
              "scripts/package_aiwf_repo.sh",
              ".package_meta",
          ]
          found = [path for path in denied if (root / path).exists()]
          found.extend(path.name for path in root.glob("dataset_*.json"))
          if found:
              print("Denied public-tree paths found:")
              for path in found:
                  print(f"- {path}")
              sys.exit(1)

      - name: Fresh public tree smoke
        working-directory: ${{ runner.temp }}/aiwf-fresh-copy
        run: |
          python -m py_compile .aiwf/bin/ai_workflow.py
          python -m pytest -q
          ./aiwf --help
          ./aiwf list
          ./aiwf new-task sample_public_ci_smoke
          ./aiwf agents install --path AGENTS.md --yes
          ./aiwf agents check --path AGENTS.md
